<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Home</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: #000000;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
        }

        .auth-container {
            position: relative;
            z-index: 1;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 50px 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.8), inset 0 0 0 1px rgba(255, 255, 255, 0.05);
            text-align: center;
        }

        .auth-container h2 {
            font-size: 26px;
            font-weight: 300;
            margin-bottom: 20px;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: #ffffff;
        }

        .status-message {
            margin-bottom: 20px;
            padding: 12px;
            font-size: 14px;
            background: rgba(0, 0, 0, 0.5);
            color: #ffffff;
            font-weight: 600;
            border-radius: 6px;
            letter-spacing: 1px;
        }

        .status-message.success {
            border: 2px solid #00ff00;
        }

        .welcome-text {
            font-size: 15px;
            color: rgba(255, 255, 255, 0.75);
            margin-bottom: 25px;
        }

        .btn-submit {
            width: 100%;
            padding: 16px;
            background: #ffffff;
            border: none;
            border-radius: 6px;
            color: #000000;
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            text-decoration: none;
            display: inline-block;
        }

        .btn-submit:hover {
            background: #e6e6e6;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.5);
        }

        .auth-links {
            margin-top: 25px;
            font-size: 13px;
        }

        .auth-links a {
            color: rgba(255, 255, 255, 0.6);
            text-decoration: none;
            letter-spacing: 1px;
            transition: color 0.3s ease;
        }

        .auth-links a:hover {
            color: #ffffff;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <h2>Home</h2>

        {% if message %}
        <div class="status-message success">
            {{ message }}
        </div>
        {% endif %}

        {% if username %}
            <div class="welcome-text">Welcome, {{ username }}.</div>
            <a href="{% url 'logout' %}" class="btn-submit">Logout</a>
        {% else %}
            <div class="welcome-text">You are not logged in.</div>
            <a href="{% url 'login' %}" class="btn-submit" style="margin-bottom: 12px;">Login</a>
            <a href="{% url 'register' %}" class="btn-submit">Register</a>
        {% endif %}
    </div>
</body>
</html>
