<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            /* Solid black background */
            background-color: #000000;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
        }

        .auth-container {
            position: relative;
            z-index: 1;
            /* Monochromatic glassmorphism */
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 50px 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.8), inset 0 0 0 1px rgba(255, 255, 255, 0.05);
            text-align: center;
        }

        .auth-container h2 {
            font-size: 26px;
            font-weight: 300;
            margin-bottom: 30px;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: #ffffff;
        }

        .status-message {
            margin-bottom: 25px;
            padding: 12px;
            font-size: 14px;
            background: rgba(0, 0, 0, 0.5);
            color: #ffffff;
            font-weight: 600;
            border-radius: 6px;
            letter-spacing: 1px;
        }

        .status-message.success {
            border: 2px solid #00ff00;
        }

        .status-message.error {
            border: 2px solid #ff0000;
        }

        .form-group {
            margin-bottom: 25px;
            text-align: left;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.5);
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .form-group input {
            width: 100%;
            padding: 14px 15px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 6px;
            color: #fff;
            font-size: 16px;
            outline: none;
            transition: all 0.3s ease;
        }

        .form-group input:focus {
            background: rgba(255, 255, 255, 0.1);
            border-color: #ffffff;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.2);
        }

        .btn-submit {
            width: 100%;
            padding: 16px;
            background: #ffffff;
            border: none;
            border-radius: 6px;
            color: #000000;
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
        }

        .btn-submit:hover {
            background: #e6e6e6;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.5);
        }

        .auth-links {
            margin-top: 30px;
            font-size: 13px;
        }

        .auth-links a {
            color: rgba(255, 255, 255, 0.6);
            text-decoration: none;
            letter-spacing: 1px;
            transition: color 0.3s ease;
        }

        .auth-links a:hover {
            color: #ffffff;
        }

        .errorlist {
            list-style: none;
            margin: 8px 0 0 0;
            padding: 0;
            color: #ff8a8a;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <h2>Login</h2>
        
        {% if message %}
        <div class="status-message {% if 'Successful' in message %}success{% else %}error{% endif %}">
            {{ message }}
        </div>
        {% endif %}

        {% if form.errors %}
        <div class="status-message error">
            Please fix the errors below.
        </div>
        {% endif %}

        <form method="post">
            {% csrf_token %}
            <div class="form-group">
                <label for="{{ form.username.id_for_label }}">Username</label>
                {{ form.username }}
                {{ form.username.errors }}
            </div>
            <div class="form-group">
                <label for="{{ form.password.id_for_label }}">Password</label>
                {{ form.password }}
                {{ form.password.errors }}
            </div>
            <button type="submit" class="btn-submit">Login</button>
        </form>

        <div class="auth-links">
            <a href="{% url 'register' %}">Register</a>
        </div>
    </div>
</body>
</html>
